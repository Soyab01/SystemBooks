<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Book Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FIREBASE & RAZORPAY SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #ffffff 0%, #fff1c1 50%, #ffcc80 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
        }

        .hidden-modal { display: none !important; }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .glass-btn {
            background: linear-gradient(to right, #ff9966, #ff5e62);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 94, 98, 0.4);
            transition: transform 0.2s;
        }
        .glass-btn:active { transform: scale(0.96); }

        .nav-island {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 380px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 50;
            display: flex; justify-content: space-around; padding: 10px 0;
            border: 1px solid white;
        }
        
        .nav-item { color: #aaa; transition: 0.3s; display: flex; flex-direction: column; align-items: center; font-size: 20px; }
        .nav-item span { font-size: 10px; font-weight: 600; margin-top: 2px; }
        .nav-item.active { color: #ff5e62; transform: translateY(-2px); }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ff9966; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Smooth Category Scrollbar */
        .scroll-smooth { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-28">

    <!-- 1. AUTH SCREEN -->
    <section id="authScreen" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-white/60 backdrop-blur-md">
        <div class="w-full max-w-sm glass-card p-8 shadow-2xl">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-red-500 text-center mb-1">System Book</h1>
            <p class="text-center text-gray-500 text-sm mb-6">Store Access</p>

            <div id="authForms">
                <div id="signupBox">
                    <input id="rName" placeholder="Full Name" class="w-full p-4 mb-3 rounded-xl bg-white border-none outline-none text-sm shadow-sm">
                    <input id="rMob" type="number" placeholder="Mobile Number" class="w-full p-4 mb-3 rounded-xl bg-white border-none outline-none text-sm shadow-sm">
                    <textarea id="rAddr" placeholder="Delivery Address" class="w-full p-4 mb-3 rounded-xl bg-white border-none outline-none text-sm h-20 resize-none shadow-sm"></textarea>
                </div>
                
                <input id="uEmail" type="email" placeholder="Email Address" class="w-full p-4 mb-3 rounded-xl bg-white border-none outline-none text-sm shadow-sm">
                <input id="uPass" type="password" placeholder="Password" class="w-full p-4 mb-6 rounded-xl bg-white border-none outline-none text-sm shadow-sm">
                
                <button onclick="auth()" class="w-full glass-btn py-4 rounded-xl font-bold tracking-wide shadow-lg">
                    <span id="authBtnText">CREATE ACCOUNT</span>
                </button>
            </div>
            
            <p class="text-center mt-6 text-xs font-bold text-gray-600 cursor-pointer hover:text-orange-500 transition" onclick="toggleSign()">
                <span id="toggleText">Already have an account? Login</span>
            </p>
            <div id="authLoad" class="loader hidden-modal"></div>
        </div>
    </section>

    <!-- 2. MAIN APP -->
    <div id="appScreen" class="hidden-modal max-w-md mx-auto min-h-screen relative shadow-2xl bg-white/50">
        
        <!-- Header -->
        <header class="p-5 flex justify-between items-center sticky top-0 z-20 bg-white/80 backdrop-blur-md shadow-sm mb-2">
            <div>
                <h2 class="font-bold text-2xl text-gray-800">System Book</h2>
                <p class="text-xs text-orange-500 font-bold tracking-wide">Premium Store</p>
            </div>
            <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-red-500 rounded-full flex items-center justify-center text-white shadow-lg cursor-pointer" onclick="switchTab('profile')">
                <i class="fa-solid fa-user"></i>
            </div>
        </header>

        <!-- HOME -->
        <div id="tab-home" class="p-4 pt-0">
            
            <!-- HINDI / ENGLISH SLIDER -->
            <div class="flex justify-center mb-5">
                <div class="bg-white p-1 rounded-full flex w-full max-w-[320px] relative shadow-sm border border-gray-200">
                    <div id="sliderBg" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-gradient-to-r from-orange-400 to-red-500 rounded-full shadow-md transition-transform duration-300 transform translate-x-0"></div>
                    <button onclick="setMedium('Hindi')" id="btnMedHindi" class="flex-1 relative z-10 text-[12px] font-bold py-2.5 text-white transition-colors duration-300 tracking-wide">HINDI MEDIUM</button>
                    <button onclick="setMedium('English')" id="btnMedEnglish" class="flex-1 relative z-10 text-[12px] font-bold py-2.5 text-gray-500 transition-colors duration-300 tracking-wide">ENGLISH MEDIUM</button>
                </div>
            </div>

            <!-- Category Container (Scrollable) -->
            <div id="catContainer" class="flex gap-3 mb-6 overflow-x-auto pb-3 pt-1 px-1 scroll-smooth no-scrollbar w-full whitespace-nowrap snap-x">
                <!-- Loaded by JS based on Selected Medium -->
            </div>
            
            <!-- Product List -->
            <div id="prodList" class="grid grid-cols-2 gap-4 pb-20">
                <div class="loader col-span-2"></div>
            </div>
        </div>

        <!-- ORDERS -->
        <div id="tab-orders" class="p-4 hidden-modal">
            <h2 class="font-bold text-xl mb-4 text-gray-800">Order History</h2>
            <div id="orderList" class="space-y-4 pb-20"></div>
        </div>

        <!-- PROFILE -->
        <div id="tab-profile" class="p-4 hidden-modal">
            <div class="glass-card p-6 text-center mb-6 relative border-t-4 border-orange-400">
                <button onclick="editProfile()" class="absolute top-4 right-4 text-orange-500 text-xs font-bold bg-orange-50 px-3 py-1 rounded-full"><i class="fa-solid fa-pen"></i> Edit</button>
                <div class="w-20 h-20 bg-gradient-to-br from-orange-300 to-yellow-300 rounded-full mx-auto mb-3 flex items-center justify-center text-3xl text-white shadow-md border-4 border-white">😎</div>
                <h2 id="pName" class="font-bold text-xl text-gray-800">User</h2>
                <p id="pEmail" class="text-gray-500 text-sm">...</p>
                <div class="mt-4 text-left bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Mobile</p>
                    <p id="pMob" class="mb-3 font-semibold text-gray-700">...</p>
                    <p class="text-[10px] text-gray-400 font-bold uppercase">Address</p>
                    <p id="pAddr" class="font-semibold text-gray-700 text-sm leading-tight">...</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full bg-white p-4 rounded-xl text-red-500 font-bold shadow-md hover:bg-red-50 transition border border-red-100"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</button>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div id="checkoutModal" class="hidden-modal fixed inset-0 bg-black/50 z-[60] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl animate-[slideUp_0.4s]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-xl text-gray-800">Checkout</h3>
                <button onclick="document.getElementById('checkoutModal').classList.add('hidden-modal')" class="text-gray-400 text-2xl leading-none">&times;</button>
            </div>
            
            <div class="flex gap-4 mb-4 bg-orange-50 p-3 rounded-xl border border-orange-100">
                <img id="buyImg" class="w-16 h-16 rounded-lg object-cover bg-white shadow-sm">
                <div class="flex-1">
                    <h4 id="buyTitle" class="font-bold text-sm text-gray-800 line-clamp-2">Product</h4>
                    <span class="text-[10px] font-bold text-white bg-orange-500 px-2 py-0.5 rounded-full mt-1 inline-block" id="buyCat">Category</span>
                </div>
            </div>

            <!-- Detailed Price Breakdown -->
            <div class="bg-gray-50 rounded-xl p-4 mb-4 border border-gray-100 text-sm text-gray-700">
                <div class="flex justify-between mb-2">
                    <span>Book Price</span> <span id="chkPrice" class="font-semibold">₹0</span>
                </div>
                <div class="flex justify-between mb-2 text-gray-500">
                    <span>Delivery Charge</span> <span id="chkDel" class="font-semibold">+₹0</span>
                </div>
                <div class="h-px bg-gray-200 w-full my-2"></div>
                <div class="flex justify-between font-bold text-lg text-gray-800 mt-1">
                    <span>Total Bill</span> <span id="billTotal" class="text-orange-600">₹0</span>
                </div>
            </div>

            <!-- Address Section with Edit Button -->
            <div class="flex justify-between items-end mb-1">
                <p class="text-xs font-bold text-gray-400">DELIVER TO</p>
                <button onclick="editProfile()" class="text-xs text-orange-600 font-bold bg-orange-100 px-2 py-1 rounded hover:bg-orange-200 transition"><i class="fa-solid fa-pen"></i> Edit Address</button>
            </div>
            <p id="buyAddr" class="text-sm bg-gray-100 p-3 rounded-lg mb-5 text-gray-600 border border-gray-200 leading-tight">...</p>
            
            <p class="text-xs font-bold text-gray-400 mb-2">PAYMENT METHOD</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <label class="flex flex-col items-center justify-center p-3 border-2 rounded-xl cursor-pointer has-[:checked]:border-orange-500 has-[:checked]:bg-orange-50 transition">
                    <input type="radio" name="pay" value="COD" checked class="hidden">
                    <i class="fa-solid fa-money-bill-wave text-2xl text-green-600 mb-1"></i>
                    <span class="text-xs font-bold text-gray-600">Cash on Delivery</span>
                </label>
                <label class="flex flex-col items-center justify-center p-3 border-2 rounded-xl cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50 transition">
                    <input type="radio" name="pay" value="Online" class="hidden">
                    <i class="fa-brands fa-cc-visa text-2xl text-blue-600 mb-1"></i>
                    <span class="text-xs font-bold text-gray-600">Pay Online</span>
                </label>
            </div>
            <button onclick="processPayment()" class="w-full glass-btn py-3.5 rounded-xl font-bold shadow-xl text-lg tracking-wide">PLACE ORDER</button>
        </div>
    </div>

    <!-- EDIT MODAL (Overlaps Checkout if opened from there) -->
    <div id="editModal" class="hidden-modal fixed inset-0 bg-black/60 z-[70] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm p-6 rounded-2xl shadow-2xl">
            <h3 class="font-bold text-lg mb-4 text-gray-800">Update Profile/Address</h3>
            <input id="eName" placeholder="Full Name" class="w-full p-3 mb-3 border rounded-xl bg-gray-50 text-sm focus:border-orange-400 outline-none">
            <input id="eMob" placeholder="Mobile Number" type="number" class="w-full p-3 mb-3 border rounded-xl bg-gray-50 text-sm focus:border-orange-400 outline-none">
            <textarea id="eAddr" placeholder="Full Delivery Address with Pincode" class="w-full p-3 mb-4 border rounded-xl bg-gray-50 h-24 text-sm focus:border-orange-400 outline-none"></textarea>
            
            <div class="flex gap-2">
                <button onclick="document.getElementById('editModal').classList.add('hidden-modal')" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-xl font-bold">Cancel</button>
                <button onclick="saveProfile()" class="flex-1 glass-btn py-3 rounded-xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav id="navBar" class="nav-island hidden-modal">
        <button onclick="switchTab('home')" id="btn-home" class="nav-item active"><i class="fa-solid fa-house"></i><span>Home</span></button>
        <button onclick="switchTab('orders')" id="btn-orders" class="nav-item"><i class="fa-solid fa-box-open"></i><span>Orders</span></button>
        <button onclick="switchTab('profile')" id="btn-profile" class="nav-item"><i class="fa-solid fa-user"></i><span>Profile</span></button>
    </nav>

    <!-- LOGIC -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCjdy63nsilwL4cYuwUDc_0gSSPiv0bcQ0",
            authDomain: "log-in-sujla.firebaseapp.com",
            databaseURL: "https://log-in-sujla-default-rtdb.firebaseio.com",
            projectId: "log-in-sujla",
            storageBucket: "log-in-sujla.firebasestorage.app",
            messagingSenderId: "800523929993",
            appId: "1:800523929993:web:33ff995d479a16a557f958"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const STORAGE_KEY = 'sys_user_final_v1';
        let user = JSON.parse(localStorage.getItem(STORAGE_KEY));
        let allProductsData = [];
        let allCatsData = [];
        let selectedProduct = null;
        let isSignup = true;
        
        let currentMedium = 'Hindi';
        let currentCat = 'all';

        if(user) {
            document.getElementById('authScreen').classList.add('hidden-modal');
            document.getElementById('appScreen').classList.remove('hidden-modal');
            document.getElementById('navBar').classList.remove('hidden-modal');
            initData();
        } else {
            document.getElementById('authScreen').classList.remove('hidden-modal');
        }

        function toggleSign() {
            isSignup = !isSignup;
            document.getElementById('signupBox').classList.toggle('hidden-modal');
            document.getElementById('authBtnText').innerText = isSignup ? "CREATE ACCOUNT" : "LOGIN";
            document.getElementById('toggleText').innerText = isSignup ? "Already have account? Login" : "New here? Create Account";
        }

        function auth() {
            const email = document.getElementById('uEmail').value.trim().toLowerCase();
            const pass = document.getElementById('uPass').value;
            const key = email.replace(/\./g, ',');

            document.getElementById('authLoad').classList.remove('hidden-modal');
            document.getElementById('authForms').classList.add('hidden-modal');

            if(isSignup) {
                const name = document.getElementById('rName').value;
                const mob = document.getElementById('rMob').value;
                const addr = document.getElementById('rAddr').value;
                if(!name || !mob) { alert("Fill all details"); resetUI(); return; }

                const data = {name, email, mobile: mob, addr, pass};
                db.ref('users/'+key).set(data).then(()=> success(data));
            } else {
                db.ref('users/'+key).once('value', snap => {
                    if(snap.val() && snap.val().pass == pass) success(snap.val());
                    else { alert("Login Failed"); resetUI(); }
                });
            }
        }

        function resetUI() {
            document.getElementById('authLoad').classList.add('hidden-modal');
            document.getElementById('authForms').classList.remove('hidden-modal');
        }

        function success(data) {
            user = data;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            location.reload(); 
        }

        function logout() {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        function initData() {
            db.ref('categories').on('value', s => {
                allCatsData = s.val() ? Object.values(s.val()) : [];
                filterView();
            });

            db.ref('products').on('value', s => {
                allProductsData = [];
                if(s.val()) Object.keys(s.val()).forEach(k => allProductsData.push({id:k, ...s.val()[k]}));
                filterView();
            });
            updateProfile();
        }

        function setMedium(m) {
            currentMedium = m;
            currentCat = 'all'; 
            
            const sliderBg = document.getElementById('sliderBg');
            const btnH = document.getElementById('btnMedHindi');
            const btnE = document.getElementById('btnMedEnglish');

            if(m === 'Hindi') {
                sliderBg.style.transform = 'translateX(0)';
                btnH.classList.replace('text-gray-500', 'text-white');
                btnE.classList.replace('text-white', 'text-gray-500');
            } else {
                sliderBg.style.transform = 'translateX(100%)';
                btnE.classList.replace('text-gray-500', 'text-white');
                btnH.classList.replace('text-white', 'text-gray-500');
            }
            filterView();
        }

        function setCat(c) {
            currentCat = c;
            filterView();
        }

        function filterView() {
            const cContainer = document.getElementById('catContainer');
            
            let btnClassAll = currentCat === 'all' 
                ? "bg-gradient-to-r from-orange-400 to-red-500 text-white shadow-lg" 
                : "bg-white text-gray-700 border border-gray-200 shadow-sm";
            
            let catHTML = `<button class="snap-start ${btnClassAll} px-6 py-2 rounded-full text-xs font-bold shrink-0 transition-all" onclick="setCat('all')">All</button>`;
            
            allCatsData.forEach(cat => {
                const med = cat.medium || 'Hindi';
                if(med === currentMedium) {
                    let btnClass = currentCat === cat.name 
                        ? "bg-gradient-to-r from-orange-400 to-red-500 text-white shadow-lg" 
                        : "bg-white text-gray-700 border border-gray-200 shadow-sm";
                    catHTML += `<button class="snap-start ${btnClass} px-6 py-2 rounded-full text-xs font-bold shrink-0 transition-all" onclick="setCat('${cat.name}')">${cat.name}</button>`;
                }
            });
            cContainer.innerHTML = catHTML;

            const pList = document.getElementById('prodList');
            pList.innerHTML = "";
            
            let filteredProducts = allProductsData.filter(p => (p.medium || 'Hindi') === currentMedium);
            if(currentCat !== 'all') {
                filteredProducts = filteredProducts.filter(p => p.cat === currentCat);
            }

            if(filteredProducts.length === 0) {
                pList.innerHTML = "<p class='col-span-2 text-center text-gray-400 font-bold mt-10'>No books found in this section</p>";
            } else {
                render(filteredProducts);
            }
        }

        function render(arr) {
            const l = document.getElementById('prodList');
            arr.forEach(p => {
                // Button text changed to "खरीदें"
                l.innerHTML += `
                    <div class="glass-card p-3 flex flex-col h-full hover:scale-[1.02] transition duration-300 relative">
                        <div class="h-32 bg-gray-100 rounded-xl overflow-hidden mb-3 border border-gray-100 relative">
                            <img src="${p.img}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 flex flex-col">
                            <span class="text-[9px] text-gray-400 font-bold uppercase tracking-wider">${p.cat}</span>
                            <h3 class="font-bold text-gray-800 text-sm leading-tight mb-1 line-clamp-2">${p.title}</h3>
                            <div class="mt-auto pt-2 flex flex-col">
                                <div class="mb-2">
                                    <span class="block text-lg font-bold text-orange-600 leading-none">₹${p.price}</span>
                                    <span class="text-[10px] text-gray-400">+₹${p.delivery} Delivery</span>
                                </div>
                                <button onclick="openBuy('${p.id}')" class="w-full bg-gradient-to-r from-orange-400 to-red-500 text-white py-2 rounded-lg shadow-md text-xs font-bold tracking-wide active:scale-95 transition">खरीदें</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function updateProfile() {
            document.getElementById('pName').innerText = user.name;
            document.getElementById('pEmail').innerText = user.email;
            document.getElementById('pMob').innerText = user.mobile;
            document.getElementById('pAddr').innerText = user.addr;
        }
        function editProfile() {
            document.getElementById('editModal').classList.remove('hidden-modal');
            document.getElementById('eName').value = user.name;
            document.getElementById('eMob').value = user.mobile;
            document.getElementById('eAddr').value = user.addr;
        }
        function saveProfile() {
            user.name = document.getElementById('eName').value;
            user.mobile = document.getElementById('eMob').value;
            user.addr = document.getElementById('eAddr').value;
            const k = user.email.replace(/\./g, ',');
            db.ref('users/'+k).update(user).then(()=>{
                localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
                updateProfile();
                document.getElementById('editModal').classList.add('hidden-modal');
                // Automatically update checkout screen address if it's open
                if(document.getElementById('buyAddr')) {
                    document.getElementById('buyAddr').innerText = user.addr;
                }
            });
        }

        function openBuy(id) {
            selectedProduct = allProductsData.find(p => p.id === id);
            document.getElementById('buyImg').src = selectedProduct.img;
            document.getElementById('buyTitle').innerText = selectedProduct.title;
            document.getElementById('buyCat').innerText = selectedProduct.cat;
            
            // Setup Detailed Breakdown
            document.getElementById('chkPrice').innerText = "₹" + selectedProduct.price;
            document.getElementById('chkDel').innerText = "+₹" + selectedProduct.delivery;
            
            const total = parseInt(selectedProduct.price) + parseInt(selectedProduct.delivery);
            document.getElementById('billTotal').innerText = "₹" + total;
            
            document.getElementById('buyAddr').innerText = user.addr;
            document.getElementById('checkoutModal').classList.remove('hidden-modal');
        }

        function processPayment() {
            if(!user.addr || user.addr.length < 5) return alert("Please update your delivery address first.");
            const method = document.querySelector('input[name="pay"]:checked').value;
            const total = parseInt(selectedProduct.price) + parseInt(selectedProduct.delivery);

            if(method === "Online") {
                var options = {
                    "key": "YOUR_LIVE_API_KEY_HERE", 
                    "amount": total * 100, 
                    "currency": "INR",
                    "name": "System Book Store",
                    "description": "Purchase: " + selectedProduct.title,
                    "handler": function (response) {
                        createOrder("Online", response.razorpay_payment_id);
                    },
                    "prefill": {
                        "name": user.name,
                        "email": user.email,
                        "contact": user.mobile
                    },
                    "theme": { "color": "#ff5e62" }
                };
                var rzp1 = new Razorpay(options);
                rzp1.on('payment.failed', function (response){
                    alert("Payment Failed: " + response.error.description);
                });
                rzp1.open(); 
            } else {
                createOrder("COD", "Pending");
            }
        }

        function createOrder(method, txnId) {
            const oid = Date.now();
            const total = parseInt(selectedProduct.price) + parseInt(selectedProduct.delivery);
            const order = {
                oid,
                productTitle: selectedProduct.title,
                price: selectedProduct.price,
                delivery: selectedProduct.delivery,
                totalAmount: total,
                paymentMethod: method,
                txnId: txnId,
                userEmail: user.email,
                userName: user.name,
                userMobile: user.mobile,
                userAddr: user.addr,
                status: "Pending",
                date: new Date().toLocaleDateString()
            };

            db.ref('orders/'+oid).set(order).then(() => {
                alert("Order Placed Successfully!");
                document.getElementById('checkoutModal').classList.add('hidden-modal');
                switchTab('orders');
            });
        }

        function switchTab(t) {
            ['home','orders','profile'].forEach(i => document.getElementById('tab-'+i).classList.add('hidden-modal'));
            document.getElementById('tab-'+t).classList.remove('hidden-modal');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+t).classList.add('active');
            if(t === 'orders') {
                db.ref('orders').orderByChild('userEmail').equalTo(user.email).on('value', s => {
                    const l = document.getElementById('orderList'); l.innerHTML="";
                    if(!s.val()) { l.innerHTML="<p class='text-gray-500 text-center mt-10'>No Orders</p>"; return;}
                    Object.values(s.val()).sort((a,b)=>b.oid-a.oid).forEach(o => {
                        let c = "bg-yellow-400 text-yellow-900";
                        if(o.status === 'Shipped') c = "bg-blue-400 text-blue-900";
                        if(o.status === 'Delivered') c = "bg-green-400 text-green-900";
                        l.innerHTML += `
                            <div class="glass-card p-4">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-bold text-gray-800">${o.productTitle}</h4>
                                    <span class="text-[10px] px-2 py-1 rounded-full font-bold uppercase ${c}">${o.status}</span>
                                </div>
                                <div class="flex gap-3 text-xs text-gray-500 border-t border-gray-200 pt-2 mt-2 items-center">
                                    <span>${o.date}</span>
                                    <span class="bg-gray-100 px-2 py-0.5 rounded">${o.paymentMethod}</span>
                                    <span class="font-bold text-orange-600 ml-auto text-sm">₹${o.totalAmount}</span>
                                </div>
                            </div>
                        `;
                    });
                });
            }
        }
    </script>
</body>
</html>
